<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feminist Horror — Theme Prevalence (Chart.js)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000000;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
  }
  h1 {
    color: rgba(255,255,255,0.85);
    font-size: clamp(16px, 2.5vw, 22px);
    font-weight: 500;
    margin-bottom: 6px;
    text-align: center;
  }
  p {
    color: rgba(255,255,255,0.35);
    font-size: 12px;
    margin-bottom: 32px;
    text-align: center;
    letter-spacing: 0.04em;
  }
  .chart-container {
    position: relative;
    width: 100%;
    max-width: 700px;
    height: 420px;
  }
</style>
</head>
<body>

<h1>Theme Prevalence in Feminist Horror Games</h1>
<p>A Quick Glance</p>

<div class="chart-container">
  <canvas id="myChart"></canvas>
</div>

<script>
new Chart(document.getElementById("myChart"), {
  type: "bar",
  data: {
    labels: [
      "Violence", "Embodiment", "Motherhood", "Captivity",
      "Girlhood Horror", "Trauma / Mental Ill.", "Domesticity",
      "Woman-as-Monster", "Queer Themes", "Sexualized Violence"
    ],
    datasets: [{
      label: "Number of games",
      data: [63, 54, 47, 47, 45, 44, 20, 20, 11, 10],
      backgroundColor: [
        "#ef4444", "#34d399", "#c084fc", "#f87171",
        "#a78bfa", "#fb923c", "#f472b6", "#e879f9",
        "#38bdf8", "#f97316"
      ],
      hoverBackgroundColor: [
        "#f87171", "#6ee7b7", "#d8b4fe", "#fca5a5",
        "#c4b5fd", "#fdba74", "#f9a8d4", "#f0abfc",
        "#7dd3fc", "#fdba74"
      ],
      borderRadius: 3,
      borderSkipped: false,
    }]
  },
  options: {
    indexAxis: "y",
    responsive: true,
    maintainAspectRatio: false,
    animation: {
      duration: 700,
      easing: "easeOutCubic",
    },
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ` ${ctx.parsed.x} games`
        }
      }
    },
    scales: {
      x: {
        max: 70,
        grid: { color: "rgba(255,255,255,0.07)" },
        ticks: {
          color: "rgba(255,255,255,0.55)",
          font: { size: 11 },
        },
        title: {
          display: true,
          text: "Number of games",
          color: "rgba(255,255,255,0.55)",
          font: { size: 11 },
        }
      },
      y: {
        grid: { display: false },
        ticks: {
          color: "rgba(255,255,255,0.55)",
          font: { size: 12 },
        }
      }
    }
  }
});
</script>
</body>
</html>
